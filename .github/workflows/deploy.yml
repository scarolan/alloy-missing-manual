name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.52/mdbook-v0.4.52-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          chmod +x mdbook
          mv mdbook /usr/local/bin/

      - name: Build book
        run: mdbook build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Encrypt HTML files with StatiCrypt
        working-directory: book
        run: |
          npx staticrypt@3.5.4 -r . \
            -p "$STATICRYPT_PASSWORD" \
            -d . \
            --short \
            --remember 30 \
            --template-title "Alloy - The Missing Manual" \
            --template-instructions "Enter the password to access this guide."
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
