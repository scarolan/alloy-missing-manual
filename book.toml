[book]
authors = ["Sean Carolan"]
language = "en"
multilingual = false
src = "src"
title = "Alloy - The Missing Manual"
description = "A practical, opinionated guide to Grafana Alloy for SEs, customers, and community users."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/scarolan/alloy-missing-manual"
edit-url-template = "https://github.com/scarolan/alloy-missing-manual/edit/main/{path}"
site-url = "/"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
use-hierarchical-prefix = true
